<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#eef3f6"/>
  <text x="450" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="bold" fill="#0b2e3b">Through-Hull &amp; Seacock Plan</text>
  <!-- Hull profile (side) -->
  <path d="M120 300 C 120 200, 260 150, 450 150 C 660 150, 800 210, 820 300 C 760 380, 640 410, 450 410 C 270 410, 170 380, 120 300 Z"
        fill="#d7e6ee" stroke="#0b2e3b" stroke-width="4"/>
  <line x1="120" y1="300" x2="820" y2="300" stroke="#3a86ff" stroke-width="3" stroke-dasharray="10 6"/>
  <text x="150" y="290" font-family="Arial" font-size="13" fill="#3a86ff">waterline</text>
  <text x="135" y="180" font-family="Arial" font-size="14" fill="#5a6b75">BOW</text>
  <text x="790" y="180" font-family="Arial" font-size="14" fill="#5a6b75">STERN</text>
  <!-- Seacocks (below waterline, red = closed-on-leaving recommended) -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#0b2e3b">
    <circle cx="300" cy="360" r="13" fill="#e63946"/><text x="300" y="395" text-anchor="middle">Engine raw-water</text>
    <circle cx="420" cy="380" r="13" fill="#e63946"/><text x="420" y="415" text-anchor="middle">Galley sink</text>
    <circle cx="520" cy="385" r="13" fill="#e63946"/><text x="520" y="420" text-anchor="middle">Head intake</text>
    <circle cx="600" cy="380" r="13" fill="#e63946"/><text x="600" y="415" text-anchor="middle">Head discharge</text>
    <circle cx="690" cy="360" r="13" fill="#2a9d8f"/><text x="690" y="395" text-anchor="middle">Bilge outlet</text>
  </g>
  <rect x="120" y="450" width="660" height="80" rx="8" fill="#ffffff" stroke="#c2d2da" stroke-width="2"/>
  <circle cx="150" cy="478" r="9" fill="#e63946"/><text x="170" y="483" font-family="Arial" font-size="14" fill="#0b2e3b">Close when leaving the boat unattended</text>
  <circle cx="150" cy="508" r="9" fill="#2a9d8f"/><text x="170" y="513" font-family="Arial" font-size="14" fill="#0b2e3b">Leave open (bilge / cockpit drains)</text>
  <text x="780" y="513" text-anchor="end" font-family="Arial" font-size="12" fill="#8a99a3">Soft wooden plug tied at each fitting</text>
</svg>
