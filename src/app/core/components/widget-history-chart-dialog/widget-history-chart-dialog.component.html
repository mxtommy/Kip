<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content class="history-dialog-content">
  @if (loading()) {
    <p class="history-message">Loading historical data…</p>
  } @else if (error()) {
    <p class="history-message error">{{ error() }}</p>
  } @else if (hasNoData()) {
    <p class="history-message">No historical data available for this widget.</p>
  } @else {
    <div class="chart-wrapper">
      <canvas #historyCanvas></canvas>
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
