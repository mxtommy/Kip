<div class="widget-options-grid">
  <mat-checkbox
    name="enableTimeout"
    [formControl]="enableTimeout()">
      Enable Widget Data TTL
  </mat-checkbox>
  <mat-form-field>
    <mat-label>TTL Timeout For Paths</mat-label>
    <input type="number" matNativeControl placeholder="Time in seconds..."
      name="dataTimeout"
      [formControl]="dataTimeout()"
      min="2"
      required>
    <span matTextSuffix>Seconds</span>
  </mat-form-field>
</div>
@if(isArray()) {
  @for (group of arrayPathControls; track $index) {
    <path-control-config style="display: block;"
      [pathFormGroup]="getPathFormGroup(group)"
      [filterSelfPaths]="filterSelfPaths().value"
      [multiCTRLArray]="multiCTRLArray">
    </path-control-config>
  }
} @else if (pathControlsGroup) {
  <ng-container [formGroup]="pathControlsGroup">
    @for (group of groupPathKeys; track $index) {
      <path-control-config style="display: block;"
        [pathFormGroup]="getPathFormGroup(group)"
        [filterSelfPaths]="filterSelfPaths().value"
        [multiCTRLArray]="multiCTRLArray">
      </path-control-config>
    }
  </ng-container>
}
<mat-checkbox
  name="filterSelfPaths"
  [formControl]="filterSelfPaths()">
    Restrict to own vessel
</mat-checkbox>
