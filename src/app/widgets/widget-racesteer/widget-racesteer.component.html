<svg-racesteer
  [compassHeading]="currentHeading()"
  [tackTrue]="tackTrue()"
  [polarSpeedRatio]="polarSpeedRatio()"
  [trueWindAngle]="trueWindAngle()"
  [trueWindSpeed]="trueWindSpeed()"
  [targetAngle]="targetAngle()"
  [optimalWindAngle]="optimalWindAngle()"
  [targetVMG]="targetVMG()"
  [VMG]="VMG()"
  [sailSetupEnabled]="$safeNavigationMigration(runtime.options()?.sailSetupEnable)"
  [driftEnabled]="$safeNavigationMigration(runtime.options()?.driftEnable)"
  [driftFlow]="driftFlow()"
  [driftSet]="driftSet()"
  [waypointEnabled]="$safeNavigationMigration(runtime.options()?.waypointEnable)"
  [waypointAngle]="waypointAngle()"
  [vmgToWaypoint]="vmgToWaypoint() ?? 0"
  [trueWindMinHistoric]="trueWindMinHistoric()"
  [trueWindMidHistoric]="trueWindMidHistoric()"
  [trueWindMaxHistoric]="trueWindMaxHistoric()"
  [gradianColor]="gradianColor()"
></svg-racesteer>
